<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Fio & Ponto</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=Caveat:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<a href="index.html" class="auth-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar ao site</a>

<div class="auth-card">
    <div class="auth-logo">
        <svg class="novelo" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" fill="#D89AA9"/>
            <path d="M20 4 C 26 10, 26 30, 20 36 C 14 30, 14 10, 20 4 Z" fill="#6B2D5C" opacity=".55"/>
            <path d="M4 20 C 10 14, 30 14, 36 20 C 30 26, 10 26, 4 20 Z" fill="#E3A857" opacity=".55"/>
        </svg>
        <h1>Entrar</h1>
        <p>Acesse sua conta Fio & Ponto</p>
    </div>

    <form id="formLogin">
        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" required placeholder="seuemail@exemplo.com">
        </div>
        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" required placeholder="Sua senha">
        </div>
        <button type="submit" class="btn btn-primary" id="botaoEntrar">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>
    </form>

    <div class="auth-msg" id="mensagem"></div>

    <div class="auth-rodape">
        Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>

const formLogin = document.getElementById("formLogin");
const mensagemEl = document.getElementById("mensagem");
const botaoEntrar = document.getElementById("botaoEntrar");

function mostrarMensagem(texto, tipo){
    mensagemEl.textContent = texto;
    mensagemEl.className = "auth-msg " + (tipo || "");
}

formLogin.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value;

    botaoEntrar.disabled = true;
    mostrarMensagem("Entrando...", "");

    try{
        await fazerLogin(email, senha);
        const perfil = await obterPerfilAtual();

        mostrarMensagem("Login realizado! Redirecionando...", "sucesso");
        setTimeout(() => irParaAreaDoPapel(perfil), 700);

    }catch(erro){
        console.error(erro);
        mostrarMensagem(erro.message === "Invalid login credentials"
            ? "E-mail ou senha inválidos."
            : (erro.message || "Não foi possível entrar."), "erro");
        botaoEntrar.disabled = false;
    }
});

</script>
</body>
</html>
