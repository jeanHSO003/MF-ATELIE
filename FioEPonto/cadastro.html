<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta — Fio & Ponto</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=Caveat:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<a href="index.html" class="auth-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar ao site</a>

<div class="auth-card">
    <div class="auth-logo">
        <svg class="novelo" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" fill="#D89AA9"/>
            <path d="M20 4 C 26 10, 26 30, 20 36 C 14 30, 14 10, 20 4 Z" fill="#6B2D5C" opacity=".55"/>
            <path d="M4 20 C 10 14, 30 14, 36 20 C 30 26, 10 26, 4 20 Z" fill="#E3A857" opacity=".55"/>
        </svg>
        <h1>Criar conta</h1>
        <p>Cadastre-se para fazer suas encomendas</p>
    </div>

    <form id="formCadastro">
        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" required placeholder="Seu nome">
        </div>
        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" required placeholder="seuemail@exemplo.com">
        </div>
        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" required minlength="6" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="campo">
            <label for="confirmarSenha">Confirmar senha</label>
            <input type="password" id="confirmarSenha" required minlength="6" placeholder="Repita a senha">
        </div>
        <button type="submit" class="btn btn-primary" id="botaoCadastrar">
            <i class="fa-solid fa-user-plus"></i> Criar conta
        </button>
    </form>

    <div class="auth-msg" id="mensagem"></div>

    <div class="auth-rodape">
        Já tem conta? <a href="login.html">Entrar</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>

const formCadastro = document.getElementById("formCadastro");
const mensagemEl = document.getElementById("mensagem");
const botaoCadastrar = document.getElementById("botaoCadastrar");

function mostrarMensagem(texto, tipo){
    mensagemEl.textContent = texto;
    mensagemEl.className = "auth-msg " + (tipo || "");
}

formCadastro.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value;
    const confirmarSenha = document.getElementById("confirmarSenha").value;

    if(senha !== confirmarSenha){
        mostrarMensagem("As senhas não coincidem.", "erro");
        return;
    }

    botaoCadastrar.disabled = true;
    mostrarMensagem("Criando sua conta...", "");

    try{
        const resultado = await cadastrarUsuario(nome, email, senha);

        // Se a confirmação de e-mail estiver ativada no Supabase,
        // ainda não existe sessão aqui — pedimos para checar o e-mail.
        if(!resultado.session){
            mostrarMensagem("Conta criada! Confira seu e-mail para confirmar o cadastro antes de entrar.", "sucesso");
            botaoCadastrar.disabled = false;
            return;
        }

        const perfil = await obterPerfilAtual();
        mostrarMensagem("Conta criada com sucesso! Redirecionando...", "sucesso");
        setTimeout(() => irParaAreaDoPapel(perfil), 700);

    }catch(erro){
        console.error(erro);
        mostrarMensagem(erro.message || "Não foi possível criar a conta.", "erro");
        botaoCadastrar.disabled = false;
    }
});

</script>
</body>
</html>
